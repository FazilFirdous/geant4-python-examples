<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#D1386C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Cora">
    <title>Cora — Kulgam's Food, Delivered</title>
    <link rel="manifest" href="/cora/customer/manifest.json">
    <link rel="apple-touch-icon" href="/cora/assets/icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.0/dist/tailwind.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous">
    <link rel="stylesheet" href="/cora/customer/css/app.css">
</head>
<body>
    <!-- App Shell -->
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="loading-screen">
            <div class="loading-logo">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
                </div>
                <h1>Cora</h1>
                <p>Kulgam's Food, Delivered</p>
            </div>
            <div class="loading-spinner"></div>
        </div>

        <!-- Auth Screen (Demo — phone only, no OTP) -->
        <div id="auth-screen" class="screen" style="display:none;">
            <div class="auth-header">
                <div class="auth-circles"></div>
                <div class="auth-logo">
                    <span class="auth-emoji" style="display:flex;justify-content:center;margin-bottom:8px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
                    </span>
                    <h1>Cora</h1>
                    <p>Kulgam's Food, Delivered</p>
                </div>
            </div>
            <div class="auth-body">
                <h2>Welcome!</h2>
                <p class="text-sub">Enter your phone number to continue</p>
                <div class="input-group" style="margin-top:24px;">
                    <label>Phone Number</label>
                    <div class="phone-input">
                        <span class="country-code">🇮🇳 +91</span>
                        <input type="tel" id="phone-input" placeholder="98765 43210" maxlength="10" inputmode="numeric">
                    </div>
                </div>
                <button id="login-btn" class="btn-primary" style="margin-top:20px;width:100%;">
                    Continue
                </button>
                <p style="text-align:center;margin-top:16px;font-size:12px;color:var(--text-muted);">No OTP needed — demo mode active</p>
            </div>
        </div>

        <!-- Main App -->
        <div id="main-app" style="display:none;">
            <!-- Offline Banner -->
            <div id="offline-banner" class="offline-banner" style="display:none;">
                You're offline. Showing cached data.
            </div>

            <!-- Screen Container -->
            <div id="screen-container"></div>

            <!-- Bottom Navigation -->
            <nav id="bottom-nav" class="bottom-nav">
                <a href="#home" class="nav-item active" data-screen="home">
                    <span class="nav-icon"><i data-lucide="home"></i></span>
                    <span class="nav-label">Home</span>
                    <span class="nav-dot"></span>
                </a>
                <a href="#search" class="nav-item" data-screen="search">
                    <span class="nav-icon"><i data-lucide="search"></i></span>
                    <span class="nav-label">Search</span>
                    <span class="nav-dot"></span>
                </a>
                <a href="#orders" class="nav-item" data-screen="orders">
                    <span class="nav-icon"><i data-lucide="clipboard-list"></i></span>
                    <span class="nav-label">Orders</span>
                    <span class="nav-dot"></span>
                </a>
                <a href="#support" class="nav-item" data-screen="support">
                    <span class="nav-icon"><i data-lucide="message-circle"></i></span>
                    <span class="nav-label">Help</span>
                    <span class="nav-dot"></span>
                </a>
                <a href="#profile" class="nav-item" data-screen="profile">
                    <span class="nav-icon"><i data-lucide="user"></i></span>
                    <span class="nav-label">Profile</span>
                    <span class="nav-dot"></span>
                </a>
            </nav>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>

    <!-- App Scripts -->
    <script src="/cora/customer/js/api.js"></script>
    <script src="/cora/customer/js/components/loading.js"></script>
    <script src="/cora/customer/js/components/promo-carousel.js"></script>
    <script src="/cora/customer/js/components/restaurant-card.js"></script>
    <script src="/cora/customer/js/components/menu-item.js"></script>
    <script src="/cora/customer/js/components/cart-bar.js"></script>
    <script src="/cora/customer/js/components/navbar.js"></script>
    <script src="/cora/customer/js/screens/home.js"></script>
    <script src="/cora/customer/js/screens/restaurant.js"></script>
    <script src="/cora/customer/js/screens/cart.js"></script>
    <script src="/cora/customer/js/screens/tracking.js"></script>
    <script src="/cora/customer/js/screens/orders.js"></script>
    <script src="/cora/customer/js/screens/support.js"></script>
    <script src="/cora/customer/js/screens/profile.js"></script>
    <script src="/cora/customer/js/screens/search.js"></script>
    <script src="/cora/customer/js/app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/cora/customer/sw.js', { scope: '/cora/customer/' })
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.log('SW failed:', err));
            });
        }
    </script>
</body>
</html>
